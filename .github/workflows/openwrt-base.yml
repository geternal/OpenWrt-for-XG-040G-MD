name: OpenWrt XG-040G-MD Base Build

on:
  workflow_dispatch:
  push:
    paths:
      - config/xg-040g-md.config

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses-dev libssl-dev python3 python3-dev \
          rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
        git clone --depth 1 https://github.com/openwrt/openwrt.git -b openwrt-25.12 openwrt

    - name: Feeds (minimal)
      run: |
        cd openwrt
        ./scripts/feeds update base luci
        ./scripts/feeds install -a -p base
        ./scripts/feeds install -a -p luci

    - name: Load config
      run: |
        cd openwrt
        cp ../config/xg-040g-md.config .config
        make defconfig

    - name: Apply patches
      run: |
        cd patch
        [ -e airoha/01_leds ] && cp -f airoha/01_leds ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds || true
        [ -e airoha/02_network ] && cp -f airoha/02_network ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network || true
        [ -f airoha/an7581-nokia_xg-040g-md.dts ] && cp -f airoha/an7581-nokia_xg-040g-md.dts ../openwrt/target/linux/airoha/an7581/dts/ || true
        [ -f airoha/an7581.mk ] && cp -f airoha/an7581.mk ../openwrt/target/linux/airoha/an7581/ || true
        # 应用内核补丁
        [ -d airoha/patches-6.12 ] && cp -rf airoha/patches-6.12/* ../openwrt/target/linux/airoha/patches-6.12/ || true
        [ -d generic/pending-6.12 ] && cp -rf generic/pending-6.12/* ../openwrt/target/linux/generic/pending-6.12/ || true
        [ -d mediatek/patches-6.12 ] && cp -rf mediatek/patches-6.12/* ../openwrt/target/linux/mediatek/patches-6.12/ || true

    - name: Cache build dir
      uses: actions/cache@v4
      with:
        path: |
          openwrt/build_dir
          openwrt/staging_dir
          openwrt/.ccache
        key: openwrt-${{ hashFiles('config/xg-040g-md.config') }}

    - name: Build OpenWrt (kernel + packages)
      run: |
        cd openwrt
        # 首次并行构建，如果失败则重新用单线程模式获得详细错误
        make -j$(nproc) V=s || make -j1 V=sc 2>&1 | tail -500

    - name: Upload ImageBuilder
      uses: actions/upload-artifact@v4
      with:
        name: imagebuilder
        path: |
          openwrt/bin/targets/mediatek/filogic/*imagebuilder*.tar.*

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: |
          openwrt/bin/packages
